; Auris Pendant — PlatformIO configuration
; Target: Seeed XIAO ESP32S3 (or XIAO ESP32S3 Sense)
; Framework: Arduino
; Audio: PDM built-in mic (XIAO ESP32S3 Sense, GPIO42/41)

[env:xiao_esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino

; Serial monitor
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Partition scheme — minimal SPIFFS gives more app space
board_build.partitions = min_spiffs.csv

; Arduino component config passed as compiler flags
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Dependencies
lib_deps =
    ; NimBLE-Arduino uses ~1/3 the RAM of the default BLEDevice stack
    h2zero/NimBLE-Arduino @ ^2.1.2
